<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트 허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 32px 24px 0;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    header p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }

    /* ── 네비게이션 탭 ── */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 0 24px;
    }
    .nav-tab {
      padding: 11px 28px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
    .nav-tab.active {
      color: #60a5fa;
      border-bottom-color: #60a5fa;
      background: rgba(96,165,250,0.06);
    }

    /* ── 페이지 섹션 ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ════════════════════════════════
       최저가 비교 페이지
    ════════════════════════════════ */
    .search-wrap {
      max-width: 680px;
      margin: 40px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 10px;
    }
    .search-wrap input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: #64748b; }
    .search-wrap input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }
    .search-wrap button {
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-wrap button:hover { opacity: 0.88; }
    .search-wrap button:active { transform: scale(0.97); }
    .search-wrap button:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-msg {
      text-align: center;
      margin: 32px auto;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 24px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #price-results {
      max-width: 860px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }
    .result-title { font-size: 1rem; color: #64748b; margin-bottom: 18px; padding-left: 2px; }
    .result-title strong { color: #e2e8f0; }

    .cards { display: grid; gap: 16px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.16); box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
    .card.best { border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.05); }
    .card.best::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(96,165,250,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .rank { min-width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0; }
    .rank-1 { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .rank-2 { background: rgba(148,163,184,0.15); }
    .rank-3 { background: rgba(148,163,184,0.08); }
    .card-img { width: 88px; height: 88px; border-radius: 14px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
    .card-img-placeholder { width: 88px; height: 88px; border-radius: 14px; flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #334155; }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .card-source { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.4px; padding: 3px 10px; border-radius: 20px; }
    .source-naver { background: rgba(3,199,90,0.15); color: #03c75a; }
    .source-danawa { background: rgba(234,67,53,0.15); color: #f87171; }
    .card-category { font-size: 0.7rem; color: #64748b; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); }
    .card-product { font-size: 0.93rem; color: #cbd5e1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; line-height: 1.45; }
    .card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .card-mall { font-size: 0.78rem; color: #64748b; }
    .card-link { font-size: 0.78rem; color: #60a5fa; text-decoration: none; border: 1px solid rgba(96,165,250,0.3); padding: 3px 10px; border-radius: 20px; transition: background 0.2s; }
    .card-link:hover { background: rgba(96,165,250,0.1); }
    .card-price { text-align: right; flex-shrink: 0; }
    .price-value { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; line-height: 1; white-space: nowrap; }
    .price-unit { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
    .diff-banner { margin-top: 20px; padding: 14px 20px; background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.2); border-radius: 14px; font-size: 0.88rem; color: #c4b5fd; text-align: center; }
    .diff-banner strong { color: #a78bfa; }

    .history-wrap { max-width: 680px; margin: 14px auto 0; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 28px; }
    .history-tag { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 20px; padding: 4px 13px; font-size: 0.78rem; color: #94a3b8; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .history-tag:hover { background: rgba(96,165,250,0.12); color: #60a5fa; border-color: rgba(96,165,250,0.3); }

    .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 14px; padding: 20px 24px; color: #fca5a5; text-align: center; }

    /* ════════════════════════════════
       뉴스 요약 페이지
    ════════════════════════════════ */
    .news-controls {
      max-width: 860px;
      margin: 36px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .date-picker-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .date-picker-wrap label { font-size: 0.85rem; color: #94a3b8; }
    .date-picker-wrap input[type="date"] {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .date-picker-wrap input[type="date"]:focus { border-color: #60a5fa; }
    .date-picker-wrap input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: rgba(96,165,250,0.4); color: #60a5fa; }
    .cat-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.5); color: #60a5fa; }

    .news-load-btn {
      margin-left: auto;
      padding: 10px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .news-load-btn:hover { opacity: 0.88; }
    .news-load-btn:active { transform: scale(0.97); }
    .news-load-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #news-status {
      text-align: center;
      margin: 28px auto;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 24px;
    }

    #news-results {
      max-width: 860px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }

    .news-date-header {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .news-date-header span { color: #e2e8f0; font-weight: 600; }
    .news-count-badge {
      background: rgba(96,165,250,0.12);
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .news-cards { display: grid; gap: 14px; }

    .news-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 24px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .news-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

    .news-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }
    .news-num {
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(96,165,250,0.1);
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .news-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.5;
      flex: 1;
    }
    .news-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .news-title a:hover { color: #60a5fa; }

    .news-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 10px;
      padding-left: 42px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .news-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 42px;
      flex-wrap: wrap;
    }
    .news-time {
      font-size: 0.75rem;
      color: #475569;
    }
    .news-link {
      font-size: 0.75rem;
      color: #60a5fa;
      text-decoration: none;
      border: 1px solid rgba(96,165,250,0.3);
      padding: 2px 10px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .news-link:hover { background: rgba(96,165,250,0.1); }

    .news-empty {
      text-align: center;
      padding: 60px 24px;
      color: #475569;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .news-empty .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }

    /* ════════════════════════════════
       부동산 실거래가 페이지
    ════════════════════════════════ */
    .re-controls {
      max-width: 900px;
      margin: 36px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .re-field { display: flex; flex-direction: column; gap: 6px; }
    .re-field label { font-size: 0.78rem; color: #94a3b8; }
    .re-select, .re-month {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 140px;
    }
    .re-select:focus, .re-month:focus { border-color: #60a5fa; }
    .re-select option, .re-month option { background: #1e293b; }

    .re-search-btn {
      padding: 10px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .re-search-btn:hover { opacity: 0.88; }
    .re-search-btn:active { transform: scale(0.97); }
    .re-search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #re-status { text-align: center; margin: 28px auto; font-size: 0.9rem; color: #94a3b8; min-height: 24px; }

    #re-results { max-width: 900px; margin: 0 auto 60px; padding: 0 24px; }

    .re-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .re-stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
    }
    .re-stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 6px; }
    .re-stat-value { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; }
    .re-stat-value.best { color: #f472b6; }
    .re-stat-value.low  { color: #34d399; }
    .re-stat-value.avg  { color: #60a5fa; }

    .re-sort-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .re-sort-label { font-size: 0.78rem; color: #64748b; margin-right: 4px; }
    .sort-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sort-btn:hover { border-color: rgba(96,165,250,0.4); color: #60a5fa; }
    .sort-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.5); color: #60a5fa; }

    .re-table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
    table.re-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .re-table thead tr {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .re-table th {
      padding: 13px 16px;
      text-align: left;
      color: #64748b;
      font-weight: 600;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .re-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #cbd5e1;
      white-space: nowrap;
    }
    .re-table tbody tr:last-child td { border-bottom: none; }
    .re-table tbody tr:hover { background: rgba(255,255,255,0.03); }
    .price-cell { font-weight: 700; color: #f1f5f9; }
    .rank-top { color: #f472b6; font-weight: 700; }
    .rank-low { color: #34d399; }
    .deal-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(96,165,250,0.1);
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,0.2);
    }
  </style>
</head>
<body>

<header>
  <h1>🌐 스마트 허브</h1>
  <p>최저가 비교 · 일자별 뉴스 요약 서비스</p>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-page="price">🔍 최저가 비교</button>
    <button class="nav-tab" data-page="news">📰 일자별 뉴스 요약</button>
    <button class="nav-tab" data-page="realestate">🏠 아파트 실거래가</button>
  </nav>
</header>

<!-- ══════════════ 최저가 비교 페이지 ══════════════ -->
<div class="page active" id="page-price">
  <div class="search-wrap">
    <input id="queryInput" type="text" placeholder="검색할 모델명을 입력하세요 (예: 갤럭시 S24, 맥북 프로 14)" />
    <button id="searchBtn" onclick="doSearch()">검색</button>
  </div>
  <div class="history-wrap" id="historyWrap"></div>
  <div class="status-msg" id="price-status"></div>
  <div id="price-results"></div>
</div>

<!-- ══════════════ 부동산 실거래가 페이지 ══════════════ -->
<div class="page" id="page-realestate">
  <div class="re-controls">
    <div class="re-field">
      <label>시/도</label>
      <select class="re-select" id="reSido" onchange="updateGungu()">
        <option value="">선택</option>
        <option value="대전">대전</option>
        <option value="서울">서울</option>
        <option value="경기">경기</option>
        <option value="부산">부산</option>
        <option value="인천">인천</option>
        <option value="대구">대구</option>
        <option value="광주">광주</option>
        <option value="울산">울산</option>
        <option value="세종">세종</option>
      </select>
    </div>
    <div class="re-field">
      <label>구/군</label>
      <select class="re-select" id="reGungu">
        <option value="">시/도 먼저 선택</option>
      </select>
    </div>
    <div class="re-field">
      <label>계약 년월</label>
      <input type="month" class="re-month" id="reMonth" />
    </div>
    <button class="re-search-btn" id="reSearchBtn" onclick="loadRealestate()">조회</button>
  </div>
  <div id="re-status"></div>
  <div id="re-results"></div>
</div>

<!-- ══════════════ 뉴스 요약 페이지 ══════════════ -->
<div class="page" id="page-news">
  <div class="news-controls">
    <div class="date-picker-wrap">
      <label for="newDate">날짜</label>
      <input type="date" id="newsDate" />
    </div>
    <div class="category-tabs" id="catTabs">
      <button class="cat-btn active" data-cat="전체">전체</button>
      <button class="cat-btn" data-cat="정치">정치</button>
      <button class="cat-btn" data-cat="경제">경제</button>
      <button class="cat-btn" data-cat="사회">사회</button>
      <button class="cat-btn" data-cat="문화">문화/연예</button>
      <button class="cat-btn" data-cat="스포츠">스포츠</button>
      <button class="cat-btn" data-cat="IT">IT/과학</button>
    </div>
    <button class="news-load-btn" id="newsLoadBtn" onclick="loadNews()">뉴스 불러오기</button>
  </div>
  <div id="news-status"></div>
  <div id="news-results"></div>
</div>

<script>
  /* ───────── 네비게이션 ───────── */
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + tab.dataset.page).classList.add('active');
    });
  });

  /* ═══════════════════════════════════════
     최저가 비교
  ═══════════════════════════════════════ */
  const qInput    = document.getElementById('queryInput');
  const searchBtn = document.getElementById('searchBtn');
  const pStatus   = document.getElementById('price-status');
  const pResults  = document.getElementById('price-results');
  const histWrap  = document.getElementById('historyWrap');

  let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
  renderHistory();

  qInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function renderHistory() {
    histWrap.innerHTML = '';
    searchHistory.slice(0, 8).forEach(q => {
      const tag = document.createElement('span');
      tag.className = 'history-tag';
      tag.textContent = q;
      tag.onclick = () => { qInput.value = q; doSearch(); };
      histWrap.appendChild(tag);
    });
  }

  function saveHistory(q) {
    searchHistory = [q, ...searchHistory.filter(h => h !== q)].slice(0, 8);
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
    renderHistory();
  }

  async function doSearch() {
    const query = qInput.value.trim();
    if (!query) { qInput.focus(); return; }
    searchBtn.disabled = true;
    pStatus.innerHTML = '<span class="spinner"></span> 네이버 · 다나와 동시 조회 중...';
    pResults.innerHTML = '';
    try {
      const res  = await fetch('/search', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({query}) });
      const data = await res.json();
      pStatus.innerHTML = '';
      if (data.error) { pResults.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      saveHistory(query);
      renderPriceResults(data);
    } catch (e) {
      pStatus.innerHTML = '';
      pResults.innerHTML = `<div class="error-box">서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>`;
    } finally {
      searchBtn.disabled = false;
    }
  }

  function fmt(n) { return Number(n).toLocaleString('ko-KR'); }
  function sourceLabel(s) {
    if (s === '네이버쇼핑') return {cls:'source-naver', icon:'🟢', text:'네이버쇼핑'};
    if (s === '다나와')     return {cls:'source-danawa', icon:'🔴', text:'다나와'};
    return {cls:'', icon:'⚪', text:s};
  }
  function rankCls(i) { return ['rank-1','rank-2','rank-3'][i] ?? 'rank-3'; }
  function rankIcon(i) { return ['🥇','🥈','🥉'][i] ?? (i+1); }
  function imgHtml(r) {
    if (r.image) return `<img class="card-img" src="${r.image}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'card-img-placeholder',textContent:'🛒'}))">`;
    return `<div class="card-img-placeholder">🛒</div>`;
  }

  function renderPriceResults({query, results}) {
    if (!results || results.length === 0) { pResults.innerHTML = `<div class="error-box">검색 결과가 없습니다.</div>`; return; }
    let html = `<div class="result-title"><strong>"${query}"</strong> 검색 결과 ${results.length}건</div><div class="cards">`;
    results.forEach((r, i) => {
      const s = sourceLabel(r.source);
      html += `
        <div class="card ${i===0?'best':''}">
          <div class="rank ${rankCls(i)}">${rankIcon(i)}</div>
          ${imgHtml(r)}
          <div class="card-body">
            <div class="card-top">
              <span class="card-source ${s.cls}">${s.icon} ${s.text}</span>
              ${r.category ? `<span class="card-category">${r.category}</span>` : ''}
            </div>
            <div class="card-product">${r.product_name || '-'}</div>
            <div class="card-meta">
              ${r.mall_name ? `<span class="card-mall">📦 ${r.mall_name}</span>` : ''}
              ${r.link ? `<a class="card-link" href="${r.link}" target="_blank" rel="noopener">상품 바로가기 ↗</a>` : ''}
            </div>
          </div>
          <div class="card-price">
            <div class="price-value">${fmt(r.lowest_price)}</div>
            <div class="price-unit">원</div>
          </div>
        </div>`;
    });
    html += '</div>';
    if (results.length >= 2) {
      const diff = results[results.length-1].lowest_price - results[0].lowest_price;
      html += `<div class="diff-banner">💡 <strong>${results[0].source}</strong>이(가) <strong>${fmt(diff)}원</strong> 더 저렴합니다</div>`;
    }
    pResults.innerHTML = html;
  }

  /* ═══════════════════════════════════════
     일자별 뉴스 요약
  ═══════════════════════════════════════ */
  const newsDateInput = document.getElementById('newsDate');
  const newsLoadBtn   = document.getElementById('newsLoadBtn');
  const newsStat      = document.getElementById('news-status');
  const newsResults   = document.getElementById('news-results');

  // 오늘 날짜 기본값 설정
  (() => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    newsDateInput.value = `${y}-${m}-${d}`;
    newsDateInput.max   = `${y}-${m}-${d}`;
  })();

  let selectedCategory = '전체';

  document.getElementById('catTabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.dataset.cat;
  });

  async function loadNews() {
    const date = newsDateInput.value;
    newsLoadBtn.disabled = true;
    newsStat.innerHTML = '<span class="spinner"></span> 뉴스를 불러오는 중...';
    newsResults.innerHTML = '';

    try {
      const params = new URLSearchParams({ date, category: selectedCategory });
      const res  = await fetch(`/news?${params}`);
      const data = await res.json();
      newsStat.innerHTML = '';
      if (data.error) { newsResults.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      renderNews(data);
    } catch (e) {
      newsStat.innerHTML = '';
      newsResults.innerHTML = `<div class="error-box">서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>`;
    } finally {
      newsLoadBtn.disabled = false;
    }
  }

  function renderNews({date, category, items}) {
    if (!items || items.length === 0) {
      newsResults.innerHTML = `
        <div class="news-empty">
          <span class="icon">📭</span>
          <strong>${date}</strong> ${category} 카테고리의 뉴스가 없습니다.<br>
          날짜나 카테고리를 변경해 다시 시도해 보세요.
        </div>`;
      return;
    }

    let html = `
      <div class="news-date-header">
        📅 <span>${date}</span> · ${category}
        <span class="news-count-badge">${items.length}건</span>
      </div>
      <div class="news-cards">`;

    items.forEach((item, i) => {
      html += `
        <div class="news-card">
          <div class="news-card-top">
            <div class="news-num">${i+1}</div>
            <div class="news-title">
              <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
            </div>
          </div>
          ${item.description ? `<div class="news-desc">${item.description}</div>` : ''}
          <div class="news-footer">
            <span class="news-time">🕐 ${item.pub_date}</span>
            <a class="news-link" href="${item.link}" target="_blank" rel="noopener">기사 보기 ↗</a>
          </div>
        </div>`;
    });

    html += '</div>';
    newsResults.innerHTML = html;
  }

  // 뉴스 탭 활성화 시 자동 로드
  document.querySelector('[data-page="news"]').addEventListener('click', () => {
    if (!newsResults.innerHTML.trim()) loadNews();
  });

  /* ═══════════════════════════════════════
     부동산 실거래가
  ═══════════════════════════════════════ */
  const REGIONS = {
    "대전": { "동구":"34110","중구":"34140","서구":"34170","유성구":"34200","대덕구":"34230" },
    "서울": {
      "종로구":"11110","중구":"11140","용산구":"11170","성동구":"11200","광진구":"11215",
      "동대문구":"11230","중랑구":"11260","성북구":"11290","강북구":"11305","도봉구":"11320",
      "노원구":"11350","은평구":"11380","서대문구":"11410","마포구":"11440","양천구":"11470",
      "강서구":"11500","구로구":"11530","금천구":"11545","영등포구":"11560","동작구":"11590",
      "관악구":"11620","서초구":"11650","강남구":"11680","송파구":"11710","강동구":"11740"
    },
    "경기": {
      "수원 장안구":"41111","수원 권선구":"41113","수원 팔달구":"41115","수원 영통구":"41117",
      "성남 수정구":"41131","성남 중원구":"41133","성남 분당구":"41135","의정부시":"41150",
      "안양 만안구":"41171","안양 동안구":"41173","부천시":"41190","광명시":"41210",
      "평택시":"41220","동두천시":"41250","안산 상록구":"41271","안산 단원구":"41273",
      "고양 덕양구":"41281","고양 일산동구":"41285","고양 일산서구":"41287","과천시":"41290",
      "구리시":"41310","남양주시":"41360","용인 처인구":"41461","용인 기흥구":"41463",
      "용인 수지구":"41465","하남시":"41450","화성시":"41590","광주시":"41610"
    },
    "부산": {
      "중구":"26110","서구":"26140","동구":"26170","영도구":"26200","부산진구":"26230",
      "동래구":"26260","남구":"26290","북구":"26320","해운대구":"26350","사하구":"26380",
      "금정구":"26410","강서구":"26440","연제구":"26470","수영구":"26500","사상구":"26530","기장군":"26710"
    },
    "인천": {
      "중구":"28110","동구":"28140","미추홀구":"28177","연수구":"28185","남동구":"28200",
      "부평구":"28237","계양구":"28245","서구":"28260","강화군":"28710","옹진군":"28720"
    },
    "대구": {
      "중구":"27110","동구":"27140","서구":"27170","남구":"27200","북구":"27230",
      "수성구":"27290","달서구":"27290","달성군":"27710"
    },
    "광주": {
      "동구":"29110","서구":"29140","남구":"29155","북구":"29170","광산구":"29200"
    },
    "울산": {
      "중구":"31110","남구":"31140","동구":"31170","북구":"31200","울주군":"31710"
    },
    "세종": { "세종시":"36110" },
  };

  const reSido    = document.getElementById('reSido');
  const reGungu   = document.getElementById('reGungu');
  const reMonth   = document.getElementById('reMonth');
  const reSearchBtn = document.getElementById('reSearchBtn');
  const reStat    = document.getElementById('re-status');
  const reResults = document.getElementById('re-results');

  // 기본 년월: 이번 달
  (() => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    reMonth.value = `${y}-${m}`;
    reMonth.max   = `${y}-${m}`;
  })();

  function updateGungu() {
    const sido = reSido.value;
    reGungu.innerHTML = '';
    if (!sido || !REGIONS[sido]) {
      reGungu.innerHTML = '<option value="">시/도 먼저 선택</option>';
      return;
    }
    Object.entries(REGIONS[sido]).forEach(([name, code], i) => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = name;
      if (i === 0) opt.selected = true;
      reGungu.appendChild(opt);
    });
  }

  let reData = [];
  let sortKey = 'price';
  let sortDir = -1; // -1: 내림차순

  async function loadRealestate() {
    const lawd_cd  = reGungu.value;
    const monthVal = reMonth.value; // YYYY-MM
    if (!lawd_cd)  { alert('구/군을 선택해주세요.'); return; }
    if (!monthVal) { alert('년월을 선택해주세요.'); return; }

    const deal_ymd = monthVal.replace('-', '');
    reSearchBtn.disabled = true;
    reStat.innerHTML = '<span class="spinner"></span> 실거래 데이터 조회 중...';
    reResults.innerHTML = '';

    try {
      const res  = await fetch(`/realestate?lawd_cd=${lawd_cd}&deal_ymd=${deal_ymd}`);
      const data = await res.json();
      reStat.innerHTML = '';
      if (data.error) { reResults.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      reData = data.items || [];
      sortKey = 'price'; sortDir = -1;
      renderReTable(data);
    } catch (e) {
      reStat.innerHTML = '';
      reResults.innerHTML = `<div class="error-box">서버 오류가 발생했습니다.</div>`;
    } finally {
      reSearchBtn.disabled = false;
    }
  }

  function fmtPrice(만원) {
    if (!만원) return '-';
    if (만원 >= 10000) {
      const 억 = Math.floor(만원 / 10000);
      const 나머지 = 만원 % 10000;
      return 나머지 > 0 ? `${억}억 ${나머지.toLocaleString()}만` : `${억}억`;
    }
    return `${만원.toLocaleString()}만`;
  }

  function renderReTable({ deal_ymd, total, items }) {
    if (!items || items.length === 0) {
      reResults.innerHTML = `
        <div class="news-empty">
          <span class="icon">🏘️</span>
          해당 기간 실거래 데이터가 없습니다.
        </div>`;
      return;
    }

    const prices   = items.map(i => i.price).filter(p => p > 0);
    const maxPrice = Math.max(...prices);
    const minPrice = Math.min(...prices);
    const avgPrice = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
    const ym = `${deal_ymd.slice(0,4)}년 ${deal_ymd.slice(4)}월`;

    let html = `
      <div style="font-size:0.85rem;color:#64748b;margin-bottom:16px;">
        📍 ${ym} 실거래 <span style="color:#e2e8f0;font-weight:600">${total}건</span>
      </div>
      <div class="re-summary">
        <div class="re-stat"><div class="re-stat-label">최고 거래가</div><div class="re-stat-value best">${fmtPrice(maxPrice)}</div></div>
        <div class="re-stat"><div class="re-stat-label">최저 거래가</div><div class="re-stat-value low">${fmtPrice(minPrice)}</div></div>
        <div class="re-stat"><div class="re-stat-label">평균 거래가</div><div class="re-stat-value avg">${fmtPrice(avgPrice)}</div></div>
        <div class="re-stat"><div class="re-stat-label">총 거래 건수</div><div class="re-stat-value">${total}건</div></div>
      </div>
      <div class="re-sort-bar">
        <span class="re-sort-label">정렬:</span>
        <button class="sort-btn active" data-key="price">거래금액</button>
        <button class="sort-btn" data-key="date">계약일</button>
        <button class="sort-btn" data-key="area">전용면적</button>
        <button class="sort-btn" data-key="floor">층수</button>
      </div>
      <div class="re-table-wrap">
        <table class="re-table">
          <thead>
            <tr>
              <th>#</th>
              <th>아파트명</th>
              <th>법정동</th>
              <th>층</th>
              <th>전용면적(㎡)</th>
              <th>거래금액</th>
              <th>계약일</th>
              <th>건축년도</th>
              <th>거래유형</th>
            </tr>
          </thead>
          <tbody id="reTableBody"></tbody>
        </table>
      </div>`;

    reResults.innerHTML = html;

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (sortKey === key) { sortDir *= -1; }
        else { sortKey = key; sortDir = key === 'price' ? -1 : 1; }
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fillTableBody();
      });
    });

    fillTableBody();
  }

  function fillTableBody() {
    const sorted = [...reData].sort((a, b) => {
      if (sortKey === 'price') return (a.price - b.price) * sortDir;
      if (sortKey === 'area')  return (parseFloat(a.area) - parseFloat(b.area)) * sortDir;
      if (sortKey === 'floor') return (parseInt(a.floor) - parseInt(b.floor)) * sortDir;
      if (sortKey === 'date')  return (`${a.year}${String(a.month).padStart(2,'0')}${String(a.day).padStart(2,'0')}` > `${b.year}${String(b.month).padStart(2,'0')}${String(b.day).padStart(2,'0')}` ? 1 : -1) * sortDir;
      return 0;
    });

    const prices = reData.map(i=>i.price).filter(p=>p>0);
    const max = Math.max(...prices);
    const min = Math.min(...prices);

    const tbody = document.getElementById('reTableBody');
    tbody.innerHTML = sorted.map((r, i) => {
      const isTop = r.price === max;
      const isLow = r.price === min;
      const priceClass = isTop ? 'rank-top' : isLow ? 'rank-low' : '';
      return `
        <tr>
          <td style="color:#475569">${i+1}</td>
          <td style="font-weight:600;color:#e2e8f0">${r.apt_name || '-'}</td>
          <td>${r.dong || '-'}</td>
          <td>${r.floor || '-'}층</td>
          <td>${parseFloat(r.area || 0).toFixed(2)}</td>
          <td class="price-cell ${priceClass}">${fmtPrice(r.price)}</td>
          <td>${r.year}.${String(r.month).padStart(2,'0')}.${String(r.day).padStart(2,'0')}</td>
          <td>${r.build_year || '-'}</td>
          <td>${r.deal_type ? `<span class="deal-badge">${r.deal_type}</span>` : '-'}</td>
        </tr>`;
    }).join('');
  }
</script>
</body>
</html>
