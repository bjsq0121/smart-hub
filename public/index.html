<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트 허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 32px 24px 0;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    header p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }

    /* ── 네비게이션 탭 ── */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 0 24px;
    }
    .nav-tab {
      padding: 11px 28px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
    .nav-tab.active {
      color: #60a5fa;
      border-bottom-color: #60a5fa;
      background: rgba(96,165,250,0.06);
    }

    /* ── 페이지 섹션 ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ════════════════════════════════
       최저가 비교 페이지
    ════════════════════════════════ */
    .search-wrap {
      max-width: 680px;
      margin: 40px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 10px;
    }
    .search-wrap input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: #64748b; }
    .search-wrap input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }
    .search-wrap button {
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-wrap button:hover { opacity: 0.88; }
    .search-wrap button:active { transform: scale(0.97); }
    .search-wrap button:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-msg {
      text-align: center;
      margin: 32px auto;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 24px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #price-results {
      max-width: 860px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }
    .result-title { font-size: 1rem; color: #64748b; margin-bottom: 18px; padding-left: 2px; }
    .result-title strong { color: #e2e8f0; }

    .cards { display: grid; gap: 16px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.16); box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
    .card.best { border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.05); }
    .card.best::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(96,165,250,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .rank { min-width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0; }
    .rank-1 { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .rank-2 { background: rgba(148,163,184,0.15); }
    .rank-3 { background: rgba(148,163,184,0.08); }
    .card-img { width: 88px; height: 88px; border-radius: 14px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
    .card-img-placeholder { width: 88px; height: 88px; border-radius: 14px; flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #334155; }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .card-source { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.4px; padding: 3px 10px; border-radius: 20px; }
    .source-naver { background: rgba(3,199,90,0.15); color: #03c75a; }
    .source-danawa { background: rgba(234,67,53,0.15); color: #f87171; }
    .card-category { font-size: 0.7rem; color: #64748b; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); }
    .card-product { font-size: 0.93rem; color: #cbd5e1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; line-height: 1.45; }
    .card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .card-mall { font-size: 0.78rem; color: #64748b; }
    .card-link { font-size: 0.78rem; color: #60a5fa; text-decoration: none; border: 1px solid rgba(96,165,250,0.3); padding: 3px 10px; border-radius: 20px; transition: background 0.2s; }
    .card-link:hover { background: rgba(96,165,250,0.1); }
    .card-price { text-align: right; flex-shrink: 0; }
    .price-value { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; line-height: 1; white-space: nowrap; }
    .price-unit { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
    .diff-banner { margin-top: 20px; padding: 14px 20px; background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.2); border-radius: 14px; font-size: 0.88rem; color: #c4b5fd; text-align: center; }
    .diff-banner strong { color: #a78bfa; }

    .history-wrap { max-width: 680px; margin: 14px auto 0; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 28px; }
    .history-tag { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 20px; padding: 4px 13px; font-size: 0.78rem; color: #94a3b8; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .history-tag:hover { background: rgba(96,165,250,0.12); color: #60a5fa; border-color: rgba(96,165,250,0.3); }

    .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 14px; padding: 20px 24px; color: #fca5a5; text-align: center; }

    /* ════════════════════════════════
       뉴스 요약 페이지
    ════════════════════════════════ */
    .news-controls {
      max-width: 860px;
      margin: 36px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .date-picker-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .date-picker-wrap label { font-size: 0.85rem; color: #94a3b8; }
    .date-picker-wrap input[type="date"] {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .date-picker-wrap input[type="date"]:focus { border-color: #60a5fa; }
    .date-picker-wrap input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: rgba(96,165,250,0.4); color: #60a5fa; }
    .cat-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.5); color: #60a5fa; }

    .news-load-btn {
      margin-left: auto;
      padding: 10px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .news-load-btn:hover { opacity: 0.88; }
    .news-load-btn:active { transform: scale(0.97); }
    .news-load-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #news-status {
      text-align: center;
      margin: 28px auto;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 24px;
    }

    #news-results {
      max-width: 860px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }

    .news-date-header {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .news-date-header span { color: #e2e8f0; font-weight: 600; }
    .news-count-badge {
      background: rgba(96,165,250,0.12);
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .news-cards { display: grid; gap: 14px; }

    .news-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 24px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .news-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

    .news-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }
    .news-num {
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(96,165,250,0.1);
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .news-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.5;
      flex: 1;
    }
    .news-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .news-title a:hover { color: #60a5fa; }

    .news-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 10px;
      padding-left: 42px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .news-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 42px;
      flex-wrap: wrap;
    }
    .news-time {
      font-size: 0.75rem;
      color: #475569;
    }
    .news-link {
      font-size: 0.75rem;
      color: #60a5fa;
      text-decoration: none;
      border: 1px solid rgba(96,165,250,0.3);
      padding: 2px 10px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .news-link:hover { background: rgba(96,165,250,0.1); }

    .news-empty {
      text-align: center;
      padding: 60px 24px;
      color: #475569;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .news-empty .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }

    /* ════════════════════════════════
       부동산 실거래가 페이지
    ════════════════════════════════ */
    .re-controls {
      max-width: 900px;
      margin: 36px auto 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .re-field { display: flex; flex-direction: column; gap: 6px; }
    .re-field label { font-size: 0.78rem; color: #94a3b8; }
    .re-select, .re-month {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 140px;
    }
    .re-select:focus, .re-month:focus { border-color: #60a5fa; }
    .re-select option, .re-month option { background: #1e293b; }

    .re-search-btn {
      padding: 10px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .re-search-btn:hover { opacity: 0.88; }
    .re-search-btn:active { transform: scale(0.97); }
    .re-search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #re-status { text-align: center; margin: 28px auto; font-size: 0.9rem; color: #94a3b8; min-height: 24px; }

    #re-results { max-width: 900px; margin: 0 auto 60px; padding: 0 24px; }

    .re-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .re-stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
    }
    .re-stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 6px; }
    .re-stat-value { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; }
    .re-stat-value.best { color: #f472b6; }
    .re-stat-value.low  { color: #34d399; }
    .re-stat-value.avg  { color: #60a5fa; }

    .re-sort-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .re-sort-label { font-size: 0.78rem; color: #64748b; margin-right: 4px; }
    .sort-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sort-btn:hover { border-color: rgba(96,165,250,0.4); color: #60a5fa; }
    .sort-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.5); color: #60a5fa; }

    .re-table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
    table.re-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .re-table thead tr {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .re-table th {
      padding: 13px 16px;
      text-align: left;
      color: #64748b;
      font-weight: 600;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .re-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #cbd5e1;
      white-space: nowrap;
    }
    .re-table tbody tr:last-child td { border-bottom: none; }
    .re-table tbody tr:hover { background: rgba(255,255,255,0.03); }
    .price-cell { font-weight: 700; color: #f1f5f9; }
    .rank-top { color: #f472b6; font-weight: 700; }
    .rank-low { color: #34d399; }
    .deal-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(96,165,250,0.1);
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,0.2);
    }
    /* ════════════════════════════════
       AI 뉴스 요약 페이지
    ════════════════════════════════ */
    .ai-news-wrap {
      max-width: 860px;
      margin: 36px auto 60px;
      padding: 0 24px;
    }
    .ai-cat-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 24px; align-items: center;
    }
    .ai-cat-btn {
      padding: 10px 22px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #64748b;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ai-cat-btn:hover { border-color: #a78bfa; color: #a78bfa; }
    .ai-cat-btn.active {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.5);
      color: #a78bfa;
    }
    .ai-gen-btn {
      margin-left: auto;
      padding: 10px 26px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .ai-gen-btn:hover { opacity: 0.88; }
    .ai-gen-btn:active { transform: scale(0.97); }
    .ai-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #ai-status { text-align:center; margin: 28px auto; font-size:0.9rem; color:#94a3b8; min-height:24px; }
    .ai-headline {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(167,139,250,0.08));
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .ai-headline-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #a78bfa; margin-bottom: 10px;
    }
    .ai-headline-text {
      font-size: 1.1rem; font-weight: 600; color: #e2e8f0; line-height: 1.6;
    }
    .ai-points { display: grid; gap: 14px; margin-bottom: 20px; }
    .ai-point-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 24px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .ai-point-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
    .ai-point-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .ai-sentiment {
      font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.05em; flex-shrink: 0;
    }
    .sentiment-pos { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .sentiment-neg { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .sentiment-neu { background: rgba(148,163,184,0.1);  color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
    .ai-point-title { font-size: 0.98rem; font-weight: 600; color: #e2e8f0; }
    .ai-point-body { font-size: 0.85rem; color: #94a3b8; line-height: 1.7; }
    .ai-point-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: rgba(96,165,250,0.15); color: #60a5fa; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }

<script>
  /* ───────── 네비게이션 ───────── */
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + tab.dataset.page).classList.add('active');
    });
  });

  /* ═══════════════════════════════════════
     최저가 비교
  ═══════════════════════════════════════ */
  const qInput    = document.getElementById('queryInput');
  const searchBtn = document.getElementById('searchBtn');
  const pStatus   = document.getElementById('price-status');
  const pResults  = document.getElementById('price-results');
  const histWrap  = document.getElementById('historyWrap');

  let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
  renderHistory();

  qInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function renderHistory() {
    histWrap.innerHTML = '';
    searchHistory.slice(0, 8).forEach(q => {
      const tag = document.createElement('span');
      tag.className = 'history-tag';
      tag.textContent = q;
      tag.onclick = () => { qInput.value = q; doSearch(); };
      histWrap.appendChild(tag);
    });
  }

  function saveHistory(q) {
    searchHistory = [q, ...searchHistory.filter(h => h !== q)].slice(0, 8);
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
    renderHistory();
  }

  async function doSearch() {
    const query = qInput.value.trim();
    if (!query) { qInput.focus(); return; }
    searchBtn.disabled = true;
    pStatus.innerHTML = '<span class="spinner"></span> 네이버 · 다나와 동시 조회 중...';
    pResults.innerHTML = '';
    try {
      const res  = await fetch('/search', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({query}) });
      const data = await res.json();
      pStatus.innerHTML = '';
      if (data.error) { pResults.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      saveHistory(query);
      renderPriceResults(data);
    } catch (e) {
      pStatus.innerHTML = '';
      pResults.innerHTML = `<div class="error-box">서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>`;
    } finally {
      searchBtn.disabled = false;
    }
  }

  function fmt(n) { return Number(n).toLocaleString('ko-KR'); }
  function sourceLabel(s) {
    if (s === '네이버쇼핑') return {cls:'source-naver', icon:'🟢', text:'네이버쇼핑'};
    if (s === '다나와')     return {cls:'source-danawa', icon:'🔴', text:'다나와'};
    return {cls:'', icon:'⚪', text:s};
  }
  function rankCls(i) { return ['rank-1','rank-2','rank-3'][i] ?? 'rank-3'; }
  function rankIcon(i) { return ['🥇','🥈','🥉'][i] ?? (i+1); }
  function imgHtml(r) {
    if (r.image) return `<img class="card-img" src="${r.image}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'card-img-placeholder',textContent:'🛒'}))">`;
    return `<div class="card-img-placeholder">🛒</div>`;
  }

  function renderPriceResults({query, results}) {
    if (!results || results.length === 0) { pResults.innerHTML = `<div class="error-box">검색 결과가 없습니다.</div>`; return; }
    let html = `<div class="result-title"><strong>"${query}"</strong> 검색 결과 ${results.length}건</div><div class="cards">`;
    results.forEach((r, i) => {
      const s = sourceLabel(r.source);
      html += `
        <div class="card ${i===0?'best':''}">
          <div class="rank ${rankCls(i)}">${rankIcon(i)}</div>
          ${imgHtml(r)}
          <div class="card-body">
            <div class="card-top">
              <span class="card-source ${s.cls}">${s.icon} ${s.text}</span>
              ${r.category ? `<span class="card-category">${r.category}</span>` : ''}
            </div>
            <div class="card-product">${r.product_name || '-'}</div>
            <div class="card-meta">
              ${r.mall_name ? `<span class="card-mall">📦 ${r.mall_name}</span>` : ''}
              ${r.link ? `<a class="card-link" href="${r.link}" target="_blank" rel="noopener">상품 바로가기 ↗</a>` : ''}
            </div>
          </div>
          <div class="card-price">
            <div class="price-value">${fmt(r.lowest_price)}</div>
            <div class="price-unit">원</div>
          </div>
        </div>`;
    });
    html += '</div>';
    if (results.length >= 2) {
      const diff = results[results.length-1].lowest_price - results[0].lowest_price;

    if (!lawd_cd)  { alert('구/군을 선택해주세요.'); return; }

      reStat.innerHTML = '';

  function fmtPrice(만원) {
    if (!만원) return '-';
    if (만원 >= 10000) {
      const 억 = Math.floor(만원 / 10000);
      const 나머지 = 만원 % 10000;
      return 나머지 > 0 ? `${억}억 ${나머지.toLocaleString()}만` : `${억}억`;
    }
    return `${만원.toLocaleString()}만`;
  }

  function renderReTable({ deal_ymd, total, items }) {
    if (!items || items.length === 0) {
      reResults.innerHTML = `
        <div class="news-empty">
          <span class="icon">🏘️</span>
          해당 기간 실거래 데이터가 없습니다.
        </div>`;
      return;
    }

    const prices   = items.map(i => i.price).filter(p => p > 0);
    const maxPrice = Math.max(...prices);
    const minPrice = Math.min(...prices);
    const avgPrice = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
    const ym = `${deal_ymd.slice(0,4)}년 ${deal_ymd.slice(4)}월`;

    let html = `
      <div style="font-size:0.85rem;color:#64748b;margin-bottom:16px;">

            </tr>
          </thead>
          <tbody id="reTableBody"></tbody>
        </table>
      </div>`;

    reResults.innerHTML = html;

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (sortKey === key) { sortDir *= -1; }
        else { sortKey = key; sortDir = key === 'price' ? -1 : 1; }
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fillTableBody();
      });
    });

    // 동 필터 드롭다운 채우기
    const dongs = [...new Set(reData.map(i => i.dong).filter(Boolean))].sort();
    const dongSel = document.getElementById('dongFilter');
    if (dongSel) {
      dongSel.innerHTML = '<option value="">전체 동</option>';
      dongs.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dongSel.appendChild(o); });
    }

    fillTableBody();
  }

  function fillTableBody() {
    const dongVal = (document.getElementById('dongFilter')?.value || '').trim();
    const aptVal  = (document.getElementById('aptSearch')?.value || '').trim().toLowerCase();

    const filtered = reData.filter(r => {
      if (dongVal && r.dong !== dongVal) return false;
      if (aptVal  && !(r.apt_name || '').toLowerCase().includes(aptVal)) return false;
      return true;
    });

    const sorted = [...filtered].sort((a, b) => {
      if (sortKey === 'price') return (a.price - b.price) * sortDir;
      if (sortKey === 'area')  return (parseFloat(a.area) - parseFloat(b.area)) * sortDir;
      if (sortKey === 'floor') return (parseInt(a.floor) - parseInt(b.floor)) * sortDir;
      if (sortKey === 'date')  return (`${a.year}${String(a.month).padStart(2,'0')}${String(a.day).padStart(2,'0')}` > `${b.year}${String(b.month).padStart(2,'0')}${String(b.day).padStart(2,'0')}` ? 1 : -1) * sortDir;
      return 0;
    });

    const prices = filtered.map(i=>i.price).filter(p=>p>0);
    const max = prices.length ? Math.max(...prices) : 0;
    const min = prices.length ? Math.min(...prices) : 0;

    const tbody = document.getElementById('reTableBody');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:32px;color:#475569;">검색 결과가 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = sorted.map((r, i) => {
      const isTop = r.price === max;
      const isLow = r.price === min;
      const priceClass = isTop ? 'rank-top' : isLow ? 'rank-low' : '';
      return `
        <tr>
          <td style="color:#475569">${i+1}</td>
          <td style="font-weight:600;color:#e2e8f0">${r.apt_name || '-'}</td>
          <td>${r.apt_dong?.trim() || '-'}</td>
          <td>${r.dong || '-'}</td>
          <td>${r.floor || '-'}층</td>
          <td>${parseFloat(r.area || 0).toFixed(2)}</td>
          <td class="price-cell ${priceClass}">${fmtPrice(r.price)}</td>
          <td>${r.year}.${String(r.month).padStart(2,'0')}.${String(r.day).padStart(2,'0')}</td>
          <td>${r.build_year || '-'}</td>
          <td>${r.deal_type ? `<span class="deal-badge">${r.deal_type}</span>` : '-'}</td>
        </tr>`;
    }).join('');
  }

    "길이": {
      units: ["mm","cm","m","km","inch","feet","yard","mile"],
      labels: {"mm":"밀리미터(mm)","cm":"센티미터(cm)","m":"미터(m)","km":"킬로미터(km)","inch":"인치(inch)","feet":"피트(feet)","yard":"야드(yard)","mile":"마일(mile)"},
      toBase: {"mm":0.001,"cm":0.01,"m":1,"km":1000,"inch":0.0254,"feet":0.3048,"yard":0.9144,"mile":1609.344},
      quick: [["1 inch","2.54 cm"],["1 feet","30.48 cm"],["1 mile","1.609 km"],["1 yard","91.44 cm"],["100 cm","1 m"],["1 km","0.621 mile"]]
    },
    "무게": {
      units: ["mg","g","kg","t","oz","lbs","근"],
      labels: {"mg":"밀리그램(mg)","g":"그램(g)","kg":"킬로그램(kg)","t":"톤(t)","oz":"온스(oz)","lbs":"파운드(lbs)","근":"근(600g)"},
      toBase: {"mg":0.000001,"g":0.001,"kg":1,"t":1000,"oz":0.028349,"lbs":0.453592,"근":0.6},
      quick: [["1 lbs","453.6 g"],["1 oz","28.35 g"],["1 kg","2.205 lbs"],["1 t","1,000 kg"],["1 근","600 g"],["100 g","0.22 lbs"]]
    },
    "온도": {
      units: ["°C","°F","K"],
      labels: {"°C":"섭씨(°C)","°F":"화씨(°F)","K":"켈빈(K)"},
      toBase: null,
      quick: [["0 °C","32 °F"],["100 °C","212 °F"],["37 °C","98.6 °F"],["20 °C","68 °F"],["0 K","-273.15 °C"],["25 °C","77 °F"]]
    },
    "넓이": {
      units: ["mm²","cm²","m²","km²","평","acre","ha"],
      labels: {"mm²":"제곱밀리미터","cm²":"제곱센티미터","m²":"제곱미터(m²)","km²":"제곱킬로미터","평":"평(坪)","acre":"에이커","ha":"헥타르"},
      toBase: {"mm²":0.000001,"cm²":0.0001,"m²":1,"km²":1000000,"평":3.30579,"acre":4046.86,"ha":10000},
      quick: [["1 평","3.306 m²"],["1 acre","4,047 m²"],["1 ha","10,000 m²"],["330 m²","약 100평"],["1 km²","100 ha"],["1 ha","2.471 acre"]]
    }
  };

  let unitCurrentCat = "길이";

  function unitConvertTemp(val, from, to) {
    let celsius;
    if (from === "°C") celsius = val;
    else if (from === "°F") celsius = (val - 32) * 5/9;
    else celsius = val - 273.15;
    if (to === "°C") return celsius;
    if (to === "°F") return celsius * 9/5 + 32;
    return celsius + 273.15;
  }

  function unitConvert(val, from, to) {
    if (from === to) return val;
    if (unitCurrentCat === "온도") return unitConvertTemp(val, from, to);
    const tb = UNIT_CATEGORIES[unitCurrentCat].toBase;
    return val * tb[from] / tb[to];
  }

  function unitFormatNum(n) {
    if (n === "" || isNaN(n)) return "";
    const abs = Math.abs(n);
    if (abs === 0) return "0";
    if (abs < 0.0001) return n.toExponential(4);
    if (abs < 1) return parseFloat(n.toFixed(6)).toString();
    if (abs < 10000) return parseFloat(n.toFixed(4)).toString();
    return parseFloat(n.toFixed(2)).toLocaleString();
  }

  const unitFromEl    = document.getElementById("unitFrom");
  const unitToEl      = document.getElementById("unitTo");
  const unitFromInput = document.getElementById("unitFromInput");
  const unitToInput   = document.getElementById("unitToInput");
  const unitSwapBtn   = document.getElementById("unitSwap");
  const unitTabsEl    = document.getElementById("unitTabs");
  const unitRefGrid   = document.getElementById("unitRefGrid");

  function unitBuildOptions(sel, units, labels, selected) {
    sel.innerHTML = "";
    units.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u; opt.textContent = labels[u];
      if (u === selected) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function unitBuildQuickRef() {
    const quicks = UNIT_CATEGORIES[unitCurrentCat].quick;
    unitRefGrid.innerHTML = "";
    quicks.forEach(([f, t]) => {
      const el = document.createElement("div");
      el.className = "unit-ref-item";
      el.innerHTML = `<span class="unit-ref-from">${f}</span><span class="unit-ref-arrow">→</span><span class="unit-ref-to">${t}</span>`;
      unitRefGrid.appendChild(el);
    });
  }

  function unitBuildTabs() {
    unitTabsEl.innerHTML = "";
    Object.keys(UNIT_CATEGORIES).forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "unit-tab" + (cat === unitCurrentCat ? " active" : "");
      btn.textContent = cat;
      btn.onclick = () => {
        unitCurrentCat = cat;
        const cd = UNIT_CATEGORIES[cat];
        unitBuildTabs();
        unitBuildOptions(unitFromEl, cd.units, cd.labels, cd.units[0]);
        unitBuildOptions(unitToEl,   cd.units, cd.labels, cd.units[1]);
        unitFromInput.value = "1";
        unitDoConvert();
        unitBuildQuickRef();
      };
      unitTabsEl.appendChild(btn);
    });
  }

  function unitDoConvert() {
    const val = parseFloat(unitFromInput.value);
    if (isNaN(val)) { unitToInput.value = ""; return; }
    unitToInput.value = unitFormatNum(unitConvert(val, unitFromEl.value, unitToEl.value));
  }

  unitFromInput.addEventListener("input", unitDoConvert);
  unitFromEl.addEventListener("change", unitDoConvert);
  unitToEl.addEventListener("change", unitDoConvert);
  unitSwapBtn.addEventListener("click", () => {
    const tmp = unitFromEl.value;
    unitFromEl.value = unitToEl.value;
    unitToEl.value = tmp;
    unitDoConvert();
  });

  document.querySelector('[data-page="unit"]').addEventListener('click', () => {
    if (!unitTabsEl.innerHTML.trim()) {
      unitBuildTabs();
      const init = UNIT_CATEGORIES[unitCurrentCat];
      unitBuildOptions(unitFromEl, init.units, init.labels, init.units[0]);
      unitBuildOptions(unitToEl,   init.units, init.labels, init.units[1]);
      unitFromInput.value = "1";
      unitDoConvert();
      unitBuildQuickRef();
    }
  });

  /* ═══════════════════════════════════════
     AI 뉴스 요약
  ═══════════════════════════════════════ */
  let aiSelectedCat = 'AI 동향';
  const aiGenBtn  = document.getElementById('aiGenBtn');
  const aiStatus  = document.getElementById('ai-status');
  const aiResults = document.getElementById('ai-results');

  document.querySelectorAll('.ai-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ai-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      aiSelectedCat = btn.dataset.aicat;
    });
  });

  function sentimentClass(s) {
    if (s === '긍정') return 'sentiment-pos';
    if (s === '부정') return 'sentiment-neg';
    return 'sentiment-neu';
  }
  function sentimentIcon(s) {
    if (s === '긍정') return '▲';
    if (s === '부정') return '▼';
    return '─';
  }

  async function loadAiNews() {
    aiGenBtn.disabled = true;
    aiStatus.innerHTML = '<span class="spinner"></span> Gemini AI가 뉴스를 분석하는 중... (10~20초 소요)';
    aiResults.innerHTML = '';
    try {
      const res  = await fetch(`/ai-news?category=${encodeURIComponent(aiSelectedCat)}`);
      const data = await res.json();
      aiStatus.innerHTML = '';
      if (data.error) { aiResults.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      renderAiNews(data);
    } catch (e) {
      aiStatus.innerHTML = '';
      aiResults.innerHTML = `<div class="error-box">서버 오류가 발생했습니다.</div>`;
    } finally {
      aiGenBtn.disabled = false;
    }
  }

  /* ═══════════════════════════════════════
     주식 추천
  ═══════════════════════════════════════ */
  let stockData = [];
  let stockSortKey = 'per';
  let stockSortDir = 1;

  async function loadStockRecommend() {
    const market = document.getElementById('stockMarket').value;
    const [perMin, perMax] = document.getElementById('stockPer').value.split('-').map(Number);
    const [pbrMin, pbrMax] = document.getElementById('stockPbr').value.split('-').map(Number);
    const btn = document.getElementById('stockSearchBtn');
    const stat = document.getElementById('stock-status');
    const results = document.getElementById('stock-results');

    btn.disabled = true;
    stat.innerHTML = '<span class="spinner"></span> KIS API에서 종목 데이터를 조회 중... (최대 30초)';
    results.innerHTML = '';

    try {
      const params = new URLSearchParams({ market, per_min: perMin, per_max: perMax, pbr_min: pbrMin, pbr_max: pbrMax });
      const res = await fetch(`/stock-recommend?${params}`);
      const data = await res.json();
      stat.innerHTML = '';
      if (data.error) { results.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
      stockData = data.items || [];
      stockSortKey = 'per'; stockSortDir = 1;
      renderStockResults(data);
    } catch (e) {
      stat.innerHTML = '';
      results.innerHTML = `<div class="error-box">서버 오류가 발생했습니다.</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderStockResults({ market, total, pool_size, items }) {
    if (!items || items.length === 0) {
      document.getElementById('stock-results').innerHTML = `<div class="error-box">조건에 맞는 종목이 없습니다. (조회 풀: ${pool_size || 0}개)</div>`;
      return;
    }

    const avgPer = (items.reduce((s, i) => s + i.per, 0) / items.length).toFixed(1);
    const avgPbr = (items.reduce((s, i) => s + i.pbr, 0) / items.length).toFixed(2);
    const lowestPer = items.reduce((a, b) => a.per < b.per ? a : b);

    let html = `
      <div style="font-size:0.85rem;color:#64748b;margin-bottom:16px;">
        📈 ${market} 거래량 상위 ${pool_size}개 중 필터 결과 <span style="color:#e2e8f0;font-weight:600">${total}건</span>
      </div>
      <div class="re-summary">
        <div class="re-stat"><div class="re-stat-label">필터 종목 수</div><div class="re-stat-value">${total}건</div></div>
        <div class="re-stat"><div class="re-stat-label">평균 PER</div><div class="re-stat-value avg">${avgPer}</div></div>
        <div class="re-stat"><div class="re-stat-label">평균 PBR</div><div class="re-stat-value low">${avgPbr}</div></div>
        <div class="re-stat"><div class="re-stat-label">최저 PER</div><div class="re-stat-value best">${lowestPer.stock_name} (${lowestPer.per})</div></div>
      </div>
      <div class="re-sort-bar">
        <span class="re-sort-label">정렬:</span>
        <button class="sort-btn active" data-skey="per">PER</button>
        <button class="sort-btn" data-skey="pbr">PBR</button>
        <button class="sort-btn" data-skey="current_price">현재가</button>
        <button class="sort-btn" data-skey="change_rate">등락률</button>
        <button class="sort-btn" data-skey="volume">거래량</button>
        <button class="sort-btn" data-skey="market_cap">시가총액</button>
      </div>
      <div class="re-table-wrap">
        <table class="re-table">
          <thead>
            <tr>
              <th>#</th>
              <th>종목명</th>
              <th>현재가</th>
              <th>등락률</th>
              <th>PER</th>
              <th>PBR</th>
              <th>거래량</th>
              <th>RSI</th>
              <th>MA 시그널</th>
              <th>AI 판정</th>
            </tr>
          </thead>
          <tbody id="stockTableBody"></tbody>
        </table>
      </div>`;

    document.getElementById('stock-results').innerHTML = html;

    document.querySelectorAll('[data-skey]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.skey;
        if (stockSortKey === key) { stockSortDir *= -1; }
        else { stockSortKey = key; stockSortDir = key === 'change_rate' ? -1 : 1; }
        document.querySelectorAll('[data-skey]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fillStockTableBody();
      });
    });

    fillStockTableBody();
  }

  function fillStockTableBody() {
    const sorted = [...stockData].sort((a, b) => (a[stockSortKey] - b[stockSortKey]) * stockSortDir);
    const tbody = document.getElementById('stockTableBody');
    if (!sorted.length) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:32px;color:#475569;">데이터가 없습니다.</td></tr>`;
      return;
    }
    const rsiCls = v => !v ? '' : v <= 30 ? 'per-low' : v >= 70 ? 'per-high' : 'per-mid';
    const rsiLabel = v => !v ? '-' : v <= 30 ? '과매도' : v >= 70 ? '과매수' : '';
    const maCls = s => s === '골든크로스' ? 'golden' : s === '크로스임박' ? 'imminent' : s === '상승추세' ? 'uptrend' : s === '데드크로스' ? 'dead' : 'downtrend';
    const decCls = d => d === '강력매수' ? 'strong-buy' : d === '매수고려' ? 'buy' : d === '매수보류' ? 'avoid' : 'hold';
    const scoreFill = sc => sc >= 65 ? '#f87171' : sc >= 55 ? '#fbbf24' : sc >= 40 ? '#94a3b8' : '#60a5fa';

    tbody.innerHTML = sorted.map((s, i) => {
      const chgCls = s.change_rate > 0 ? 'change-up' : s.change_rate < 0 ? 'change-down' : '';
      const chgSign = s.change_rate > 0 ? '+' : '';
      const rsi = s.rsi;
      const maSignal = s.ma_signal || '없음';
      const decision = s.decision || '관망';
      const score = s.score || 50;
      const signals = s.signals || [];
      const reason = s.reason || '';
      const risk = s.risk || '';
      return `
        <tr>
          <td style="color:#475569">${i+1}</td>
          <td style="font-weight:600;color:#e2e8f0">${s.stock_name}<br><span style="font-size:0.72rem;color:#475569">${s.stock_code} · PER ${s.per.toFixed(1)} · PBR ${s.pbr.toFixed(2)}</span></td>
          <td>${s.current_price.toLocaleString()}원<br><span class="${chgCls}" style="font-size:0.78rem">${chgSign}${s.change_rate.toFixed(2)}%</span></td>
          <td class="${rsiCls(rsi)}">${rsi != null ? rsi.toFixed(1) : '-'}${rsiLabel(rsi) ? `<br><span style="font-size:0.68rem">${rsiLabel(rsi)}</span>` : ''}</td>
          <td><span class="ma-signal ${maCls(maSignal)}">${maSignal}</span>${s.ma_gap ? `<div style="font-size:0.68rem;color:#475569;margin-top:2px">MA간격 ${Math.abs(s.ma_gap).toFixed(1)}%</div>` : ''}</td>
          <td>
            <span class="decision-badge ${decCls(decision)}">${decision}</span>
            <div style="font-size:0.72rem;color:#64748b;margin-top:3px">${score}점 <span class="score-bar"><span class="score-fill" style="width:${score}%;background:${scoreFill(score)}"></span></span></div>
            ${reason ? `<div class="sentiment-reason" style="margin-top:4px">${reason}</div>` : ''}
            ${risk ? `<div style="font-size:0.68rem;color:#f87171;margin-top:2px">⚠ ${risk}</div>` : ''}
            ${signals.length ? `<div class="signal-tags">${signals.map(t=>`<span class="signal-tag">${t}</span>`).join('')}</div>` : ''}
          </td>
        </tr>`;
    }).join('');
  }

  function renderAiNews({ category, summary, articles, article_count }) {
    const { headline, points, outlook } = summary;
    let html = `
      <div class="ai-headline">
        <div class="ai-headline-label">📡 ${category} · 오늘의 동향</div>
        <div class="ai-headline-text">${headline}</div>
      </div>
      <div class="ai-points">`;

    points.forEach((p, i) => {
      const cls  = sentimentClass(p.sentiment);
      const icon = sentimentIcon(p.sentiment);
      const linkBtn = p.link ? `<a href="${p.link}" target="_blank" rel="noopener" class="ai-point-link">기사 원문 ↗</a>` : '';
      html += `
        <div class="ai-point-card">
          <div class="ai-point-top">
            <span class="ai-point-num">${i+1}</span>
            <span class="ai-sentiment ${cls}">${icon} ${p.sentiment}</span>
            <span class="ai-point-title">${p.title}</span>
          </div>
          <div class="ai-point-body">${p.summary}</div>
          ${linkBtn}
        </div>`;
    });

    html += `</div>
      <div class="ai-outlook">
        <div class="ai-outlook-icon">🔭</div>
        <div>
          <div class="ai-outlook-label">전망 & 시사점</div>
          <div class="ai-outlook-text">${outlook}</div>
        </div>
      </div>
      <div class="ai-meta">분석 기사 ${article_count}건 중 상위 ${points.length}건 선별 · Powered by Gemini 2.5 Flash</div>`;

    aiResults.innerHTML = html;
  }
</script>
</body>
</html>
